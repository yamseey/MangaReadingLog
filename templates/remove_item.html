<!DOCTYPE html>
<html>

<head>
  <title>Remove manga</title>
</head>

<body>
  <h1>Delete Manga</h1>
  <p>Are you sure you want to delete <strong>{{ item.title }}</strong> from the library?</p>
  <form action="/remove_item/{{ item.id }}" method="post">
    <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <input type="submit" name = "remove" value = "Delete manga" style="
        padding: 4px 8px;
        border: 1px solid #d6c2a8;
        border-radius: 3px;
        background-color: #ffffff;
        color: #5a4636;
        cursor: pointer;
        ">
    <input type="submit" name = "back" value = "Cancel" style="
      padding: 4px 8px;
      border: 1px solid #d6c2a8;
      border-radius: 3px;
      background-color: #ffffff;
      color: #5a4636;
      cursor: pointer;
      ">
  </form>
</body>
  <body style="
    background-color: #f6efe6;
    color: #3f342c;
    font-family: Arial, sans-serif;
    padding: 24px;">
</html>
