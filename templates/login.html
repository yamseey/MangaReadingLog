<!DOCTYPE html>
<html>

<head>
  <title>Logging in</title>
</head>

<body style="
    background-color: #f6efe6;
    color: #3f342c;
    font-family: Arial, sans-serif;
    padding: 24px;">

  <h1>Log in</h1>
  {% if session.username %}
  <p>
    Welcome back, {{ session.username }}!
  </p>
  <p>
    <a href="/logout">Logout</a>
  </p>
  {% else %}
  <form action="/login" method="post">
    <p>
      Username: <br />
      <input type="text" name="username" maxlength="25" required />
    </p>
    <p>
      Password: <br />
      <input type="password" name="password" required />
    </p>
    {% if error %}
    <p style="color:red;">{{ error }}</p>
    {% endif %}

    <input type="submit" value="Log in" style="
        padding: 4px 8px;
        border: 1px solid #d6c2a8;
        border-radius: 3px;
        background-color: #ffffff;
        color: #5a4636;
        cursor: pointer;
        ">
  </form>
  <p>
    <a href="/" style="
        display: block;
        margin-top: 16px;
        color: #7a6a5c;
        text-decoration: none;
        font-size: 14px;
        "
        onmouseover="this.style.textDecoration='underline'; this.style.color='#5a4636'"
        onmouseout="this.style.textDecoration='none'; this.style.color='#7a6a5c'">
        ← Back to Library
    </a>
</p>
  {% endif %}
</body>
</html>
