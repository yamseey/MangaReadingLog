<!DOCTYPE html>
<html>

<head>
  <title>User {{ user.username }}</title>
</head>

<body>
  <h1>User {{ user.username }}</h1>
  <p>
    Manga entries added: {{ items | count}}
  </p>
  <h2> Manga</h2>
  <ul>
    {% for item in items %}
    <li><a href="/item/{{ item.id }}">{{ item.title }}</a></li>
    {% endfor %}
  </ul>
<p>
    <a href="/" style="
        display: block;
        margin-top: 16px;
        color: #7a6a5c;
        text-decoration: none;
        font-size: 14px;
        "
        onmouseover="this.style.textDecoration='underline'; this.style.color='#5a4636'"
        onmouseout="this.style.textDecoration='none'; this.style.color='#7a6a5c'">
        ← Back to Library
    </a>
</p>
</body>
  <body style="
    background-color: #f6efe6;
    color: #3f342c;
    font-family: Arial, sans-serif;
    padding: 24px;">
</html>
