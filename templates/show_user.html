<!DOCTYPE html>
<html>

<head>
  <title>User {{ user.username }}</title>
<style>
  .back-link {
    display: block;
    margin-top: 16px;
    color: #7a6a5c;
    text-decoration: none;
    font-size: 14px;
    }

  .back-link:hover {
    text-decoration: underline;
    color: #5a4636;
    }

  .item-link {
    text-decoration: none;
    color: #5a4636;
    font-size: 15px;
    }

  .item-link:hover {
    text-decoration: underline;
    color: #3f342c;
    }
</style>
</head>

  <body style="
    background-color: #f6efe6;
    color: #3f342c;
    font-family: Arial, sans-serif;
    padding: 24px;">
  <h1>{{ user.username }}'s manga</h1>
  <p>
    Manga entries added: {{ items | count }}
  </p>
<h2 style="margin-bottom: 6px; margin-top: 16px;">Manga</h2>

{% if items %}
<ul style="list-style: none; padding: 0; margin: 0; margin-left: 12px;">
  {% for item in items %}
    <li style="margin-bottom: 8px;">
    <a href="/item/{{ item.id }}" class="item-link">
      ✿ {{ item.title }}
    </a>
    </li>
  {% endfor %}
</ul>

{% else %}
  <p style="color:#7a6a5c; margin-left: 12px;">
    ✿ No manga added yet.
  </p>
{% endif %}

<p>
    <a href="/" class="back-link">
      ← Back to Library
    </a>
</p>
</body>
</html>
