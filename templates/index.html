<!DOCTYPE html>
<html>

<head>
  <title>MangaReadingLog</title>
</head>

<body>
  <h1> MangaReadingLog </h1>
  {% if session.username %}
  <p>
    Welcome back, {{ session.username }}!
  </p>
  {% if message %}
  <p style="color:green;">{{ message }}</p>
  {% endif %}
  <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px;">
    <a href="/logout" style="
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid #e0d5c6;
      border-radius: 999px;
      background-color: #efe3d3;
      color: #5f4e42;">
      Logout
    </a>

    <a href="/new_item" style="
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid #e0d5c6;
      border-radius: 999px;
      background-color: #efe3d3;
      color: #5f4e42;">
      Add manga
    </a>

    <a href="/find_item" style="
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid #e0d5c6;
      border-radius: 999px;
      background-color: #efe3d3;
      color: #5f4e42;">
      Search
  </a>
  </div>

  {% else %}
  <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 16px;">
    <a href="/login" style="
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid #e0d5c6;
      border-radius: 999px;
      background-color: #efe3d3;
      color: #5f4e42;">
      Login
    </a>
    <a href="/register" style="
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid #e0d5c6;
      border-radius: 999px;
      background-color: #efe3d3;
      color: #5f4e42;">
      Register
    </a>
    <a href="/find_item" style="
      text-decoration: none;
      padding: 8px 14px;
      border: 1px solid #e0d5c6;
      border-radius: 999px;
      background-color: #efe3d3;
      color: #5f4e42;">
      Search
      </a>
  {% endif %}
</div>

  <h2>Library</h2>

  <ul>
    {% for item in items%}
    <li><a href="/item/{{ item.id }}">{{item.title}}</a></li>
    {% endfor %}
  </ul>

</body>
  <body style="
    background-color: #f6efe6;
    color: #3f342c;
    font-family: Arial, sans-serif;
    padding: 24px;">
</html>
