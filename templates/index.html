<!DOCTYPE html>
<html>

<head>
  <title>MangaReadingLog</title>
</head>

<body>
  <h1> MangaReadingLog </h1>
  
  {% if session.username %}
  <p>
    Welcome back, {{ session.username }}!
  </p>
  {% endif %}

  <p>
    <a href="/login">Log in</a>
    <a href="/register">Register</a>
    <a href="/logout">Logout</a>
  </p>

  <p>
    <a href="/new_item">Add manga</a>
  </p>

  <h2>Library</h2>

  <ul>
    {% for item in items%}
    <li><a href="/item/{{ item.id }}">{{item.title}}</a></li>
    {% endfor %}
  </ul>

</body>

</html>
