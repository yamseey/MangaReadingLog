<!DOCTYPE html>
<html>

<head>
  <title>Add manga</title>
</head>

  <body style="
    background-color: #f6efe6;
    color: #3f342c;
    font-family: Arial, sans-serif;
    padding: 24px;">

  <h1>Add manga</h1>
  {% if error %}
    <p style="color:red;">{{ error }}</p>
  {% endif %}
  <form action="/create_item" method="post">
  <input type="hidden" name="csrf_token" value="{{ session.csrf_token }}" />
    <p>
      Title: <br />
      <input type="text" name="title" size ="40" maxlength="100" required />
    </p>
    <p>
      Author: <br />
      <input type="text" name="author" size = "20" maxlength="100" required/>
    </p>
<p>Categories:</p>

<div style="display: flex; flex-wrap: wrap; gap: 10px; max-width: 700px;">
  {% for option in classes["Category"] %}
    <label class="tag">
      <input type="checkbox" name="categories" value="Category:{{ option }}">
      <span>{{ option }}</span>
    </label>
  {% endfor %}
</div>
<style>
.tag input {
  display: none;
}
.tag span {
  padding: 4px 10px;
  border: 1px solid #d6c2a8;
  border-radius: 999px;
  background-color: #f0e2cf;
  color: #5a4636;
  cursor: pointer;
  font-size: 13px;
  transition: 0.2s;
}
.tag input:checked + span {
    background-color: #d8bfa3;
    border-color: #c2a383;
    color: #3f2f24;
}
.tag span:hover {
  background-color: #e8d4bb;
}
</style>
    <p>
      Synopsis: <br />
      <textarea name="description" rows="8" cols="60" maxlength="1000" required ></textarea>
    </p>
  <p>
    Status: <br />
    <select name="status">
      <option value="">Select status</option>
      {% for option in classes["Status"] %}
        <option value="Status:{{ option }}">{{ option }}</option>
      {% endfor %}
    </select>
  </p>
  <p>
    Rating: <br />
    <select name="rating">
      <option value="">Select rating</option>
      {% for option in classes["Rating"] %}
        <option value="Rating:{{ option }}">
          {% for i in range(option|int) %}⭐{% endfor %} ({{ option }})
        </option>
      {% endfor %}
    </select>
  </p>
    <input type="submit" value="Add manga" style="
      padding: 4px 8px;
      border: 1px solid #d6c2a8;
      border-radius: 3px;
      background-color: #ffffff;
      color: #5a4636;
      cursor: pointer;
      ">
  <a href="/" style="
    display: block;
    margin-top: 16px;
    color: #7a6a5c;
    text-decoration: none;
    font-size: 14px;
"
    onmouseover="this.style.textDecoration='underline'; this.style.color='#5a4636'"
    onmouseout="this.style.textDecoration='none'; this.style.color='#7a6a5c'">
  ← Back to Library
  </a>
</form>
</body>
</html>
