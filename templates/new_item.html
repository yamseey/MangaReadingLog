<!DOCTYPE html>
<html>

<head>
  <title>Add manga</title>
</head>

<body>
  <h1>Add manga</h1>
  <form action="/create_item" method="post">
    <p>
      Title: <br />
      <input type="text" name="title" size ="40" maxlength="100" required />
    </p>
    <p>
      Author: <br />
      <input type="text" name="author" size = "20" maxlength="100" required/>
    </p>
    <p>
      Synopsis: <br />
      <textarea name="description" rows="8" cols="60" maxlength="1000" required ></textarea>
    </p>
    <p>
      Status: <br />
      <select name="status">
        <option value="">Choose status</option>
        <option value="reading">Reading</option>
        <option value="completed">Completed</option>
        <option value="on_hold">On-Hold</option>
        <option value="dropped">Dropped</option>
        <option value="plan_to_read">Plan to read</option>
      </select>
    </p>
  <p>
  Rating: <br />
  <select name="rating">
    <option value="">No rating</option>
    <option value="5">⭐⭐⭐⭐⭐ (5)</option>
    <option value="4">⭐⭐⭐⭐ (4)</option>
    <option value="3">⭐⭐⭐ (3)</option>
    <option value="2">⭐⭐ (2)</option>
    <option value="1">⭐ (1)</option>
  </select>
  </p>
    <input type="submit" value="Add manga" /> 
    <p>
      <a href ="/">←Back to Library</a>
    </p>
  </form>
</body>

</html>
