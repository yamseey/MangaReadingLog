<!DOCTYPE html>
<html>

<head>
  <title>Add manga</title>
</head>

<body>
  <h1>Add manga</h1>
  <form action="/create_item" method="post">
    <p>
      Title: <br />
      <input type="text" name="title" size ="40" maxlength="100" required />
    </p>
    <p>
      Author: <br />
      <input type="text" name="author" size = "20" maxlength="100" required/>
    </p>
    <p>
      Synopsis: <br />
      <textarea name="description" rows="8" cols="60" maxlength="1000" required ></textarea>
    </p>
    {% for class in classes %}
    <p>
      {{ class }}: <br />
      <select name="classes">
        <option value="">Select {{ class.lower() }}</option>
      {% for option in classes[class] %}
        {% if class == "Rating" %}
          <option value="{{ class }}:{{ option }}">
            {% for i in range(option|int) %}⭐{% endfor %} ({{ option }})
          </option>
        {% else %}
              <option value="{{ class }}:{{ option }}">{{ option }}</option>
        {% endif %}
      {% endfor %}
    </select>
    </p>
    {% endfor %}
    <input type="submit" value="Add manga" /> 
    <p>
      <a href ="/">←Back to Library</a>
    </p>
  </form>
</body>

</html>
