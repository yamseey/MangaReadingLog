<!DOCTYPE html>
<html>

<head>
  <title>Search Manga</title>
</head>

<body style="
    background-color: #f6efe6;
    color: #3f342c;
    font-family: Arial, sans-serif;
    padding: 24px;">

  <h1> Search Manga </h1>
    <form action="/find_item" method="get">
    <div style="display: flex; gap: 6px; align-items: center;"> 
      <label for="query">Search:</label>
      <input id="query" type="text" name="query" value="{{ query }}"
        placeholder="Search by title or synopsis..." size="30"
        style="
            padding: 6px 8px;
            border: 1px solid #d6c2a8;
            border-radius: 6px;
        ">

        <input type="submit" value="Search" style="
            padding: 4px 8px;
            border: 1px solid #d6c2a8;
            border-radius: 3px;
            background-color: #ffffff;
            color: #5a4636;
            cursor: pointer;
            ">
    </div>
    </form>

<p>
    <a href="/" style="
        display: block;
        margin-top: 16px;
        color: #7a6a5c;
        text-decoration: none;
        font-size: 14px;
        "
        onmouseover="this.style.textDecoration='underline'; this.style.color='#5a4636'"
        onmouseout="this.style.textDecoration='none'; this.style.color='#7a6a5c'">
        ← Back to Library
    </a>
</p>

{% if query %}
<h2 style="margin-bottom: 4px;">Results</h2>

{% if results %}
<ul style="list-style: none; padding: 0;">
  {% for item in results %}
    <li style="margin-bottom: 6px;">
      <a href="/item/{{ item.id }}" style="text-decoration:none; color:#5a4636;">
        ✿ {{ item.title }}
      </a>
    </li>
  {% endfor %}
</ul>

{% else %}
<p style="color:#7a6a5c; margin-top: 4px;">
  ✿ No manga found… maybe try a different search.
</p>
{% endif %}
{% endif %}
</body>
</html>
